name: Build Rinku Swap

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle 8.8
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build
        working-directory: rinkuswap
        run: gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: RinkuSwap-1.21.11
          path: rinkuswap/build/libs/rinkuswap-*.jar
          if-no-files-found: error
